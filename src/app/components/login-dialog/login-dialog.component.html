<h2 mat-dialog-title class="text-xl font-semibold">Login</h2>
<mat-dialog-content class="space-y-4">
  <form [formGroup]="loginForm" (ngSubmit)="loginWithEmail()">
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" required autocomplete="email" />
      <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
        Email is required
      </mat-error>
      <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
        Enter a valid email
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" type="password" required autocomplete="current-password" />
      <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
        Password is required
      </mat-error>
      <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
        Minimum 6 characters
      </mat-error>
    </mat-form-field>

    <div *ngIf="error" class="text-red-600 text-sm">{{ error }}</div>

    <div class="flex justify-end space-x-2 mt-4">
      <button mat-button type="button" (click)="close()">Cancel</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="loading || loginForm.invalid">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </div>
  </form>

  <div class="flex items-center justify-center mt-4">
    <span class="text-sm text-gray-500">or</span>
  </div>

  <div class="flex justify-center">
    <button mat-stroked-button color="primary" (click)="loginWithGoogle()" [disabled]="loading">
      <mat-icon>google</mat-icon>
      <span class="ml-2">Authenticate with Google</span>
    </button>
  </div>
</mat-dialog-content>
