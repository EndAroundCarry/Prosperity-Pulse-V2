<mat-toolbar
  class="shadow-lg px-4 sm:px-6 lg:px-8"
  [class.!bg-slate-950]="darkMode"
  [class.!bg-slate-900]="!darkMode"
  [class.!text-slate-100]="darkMode"
  [class.!text-white]="!darkMode"
>
  <div class="flex items-center gap-3 max-w-7xl mx-auto w-full">
    <svg
      class="w-9 h-9 sm:w-10 sm:h-10 shrink-0"
      viewBox="0 0 48 48"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <rect width="48" height="48" rx="10" fill="#2563eb" />
      <path
        d="M10 32 L16 26 L22 28 L28 18 L34 22 L38 14"
        stroke="white"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
      <circle cx="38" cy="14" r="3" fill="#4ade80" />
      <path
        d="M14 36 L18 32"
        stroke="#93c5fd"
        stroke-width="2"
        stroke-linecap="round"
      />
      <text
        x="24"
        y="42"
        text-anchor="middle"
        fill="#93c5fd"
        font-size="7"
        font-weight="600"
        font-family="Roboto, sans-serif"
      >
        $
      </text>
    </svg>
    <div class="flex flex-col leading-tight">
      <span class="text-lg sm:text-xl font-semibold tracking-tight">Prosperity Pulse</span>
      <span class="text-xs text-blue-200 hidden sm:block">Finance news that moves markets</span>
    </div>

    <button
      type="button"
      class="ml-auto inline-flex items-center rounded-full border px-3 py-1.5 text-sm font-semibold transition-colors duration-200"
      [class.border-slate-700]="darkMode"
      [class.border-slate-300]="!darkMode"
      [class.bg-slate-800]="darkMode"
      [class.bg-slate-100]="!darkMode"
      [class.text-slate-100]="darkMode"
      [class.text-slate-700]="!darkMode"
      (click)="toggleDarkMode()"
      aria-label="Toggle dark mode"
    >
      <span class="mr-2 text-base">{{ darkMode ? '☀️' : '🌙' }}</span>
      <span>{{ darkMode ? 'Light' : 'Dark' }}</span>
    </button>
  </div>
</mat-toolbar>
